function useTypewriter(words, speed = 80, pause = 1800) {
  const [display, setDisplay] = useState('');
  const [wi, setWi] = useState(0);
  const [ci, setCi] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const word = words[wi];
    const timeout = setTimeout(() => {
      if (!deleting) {
        setDisplay(word.slice(0, ci + 1));
        if (ci + 1 === word.length) {
          setTimeout(() => setDeleting(true), pause);
        } else setCi(c => c + 1);
      } else {
        setDisplay(word.slice(0, ci - 1));
        if (ci - 1 === 0) {
          setDeleting(false);
          setWi(w => (w + 1) % words.length);
          setCi(0);
        } else setCi(c => c - 1);
      }
    }, deleting ? speed / 2 : speed);
    return () => clearTimeout(timeout);
  }, [ci, deleting, wi, words, speed, pause]);

  return display;
}

function useFadeIn() {
  useEffect(() => {
    const els = document.querySelectorAll('.fade-in');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function App() {
  useFadeIn();

  // Custom cursor
  useEffect(() => {
    const c = document.getElementById('cursor');
    const r = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    const move = e => { mx = e.clientX; my = e.clientY; c.style.transform = `translate(${mx-5}px,${my-5}px)`; };
    const raf = () => {
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      r.style.transform = `translate(${rx-18}px,${ry-18}px)`;
      requestAnimationFrame(raf);
    };
    window.addEventListener('mousemove', move);
    raf();
    return () => window.removeEventListener('mousemove', move);
  }, []);

  return (
    <>
      <Nav/>
      <Hero/>
      <TechStack/>
      <Projects/>
      <Experience/>
      <Contact/>
      <Footer/>
    </>
  );
}
